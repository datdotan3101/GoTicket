services:
  - type: web
    name: goticket-server
    runtime: node
    region: singapore # You can change this to your preferred region (e.g., frankfurt, oregon)
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free # Free tier available on Render
    envVars:
      - key: NODE_ENV
        value: production
      # Add other required environment variables below but keep secrets empty or set in Render Dashboard
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard
      - key: REDIS_URL
        sync: false # Set this in Render Dashboard
      - key: JWT_SECRET
        sync: false # Set this in Render Dashboard
      - key: STRIPE_SECRET_KEY
        sync: false # Set this in Render Dashboard
      - key: FRONTEND_URL
        sync: false # e.g., https://your-vercel-frontend-url.vercel.app

  # Uncomment the block below if you want Render to also host your PostgreSQL database (Note: Render's free DB expires after 90 days)
  # - type: pgo
  #   name: goticket-db
  #   plan: free
  #   region: singapore
